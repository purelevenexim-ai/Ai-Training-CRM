# Alembic Configuration
# =====================

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to the `timezone` constructor by the SQLAlchemy `utcnow` function
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to run the environment during
# the 'stamp' command, regardless of autogenerate
# stamp_used = false

# if using sqlalchemy, there are some features
# dependent on server-side uniqueness enforcement
# when ALTER TABLE is used to add a constraint
# onto an existing column:
# - This mode is not guaranteed to work on all databases.
# - This mode fully supports CHECK constraints and unique constraints.
# - CAST(x AS VARCHAR) in sqlalchemy is supported.
# - the value "sqlalchemy_scheme_translate_map" may be useful.
# if this is false, the correct configuration of uniqueness will be deferred
# (see "changed_sql_mode" parameter).
# sqlalchemy_scheme_translate_map =

# if the target database is not in SQL standard compliance mode,
# then set to false
# sqlalchemy_normalize_sql_for_postgresql = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
