client_id = "ac20aa94e7fc36db4a9d71d733911da4"
application_url = "https://exclusion-association-greatly-deleted.trycloudflare.com"
embedded = true
name = "anu-login-admin"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,write_metaobject_definitions,write_metaobjects,write_products,read_pixels,write_pixels"

[auth]
redirect_urls = [ "https://exclusion-association-greatly-deleted.trycloudflare.com/api/auth" ]

[webhooks]
api_version = "2026-07"

	[[webhooks.subscriptions]]
	uri = "/webhooks/app/uninstalled"
	topics = [ "app/uninstalled" ]

	[[webhooks.subscriptions]]
	uri = "/webhooks/app/scopes_update"
	topics = [ "app/scopes_update" ]

[build]
automatically_update_urls_on_dev = true
